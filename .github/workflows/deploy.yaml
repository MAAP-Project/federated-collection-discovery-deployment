name: deploy

permissions:
  id-token: write # required for requesting the JWT
  contents: read # required for actions/checkout

on:
  workflow_dispatch:
    inputs:
      deployment_environment:
        description: 'environment (either dev or test)'
        required: true
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment: "${{ github.event.inputs.deployment_environment }}"

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout client repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: developmentseed/stac-collection-discovery
          path: client_app
          ref: "${{ vars.APP_REF }}"

      - name: Set up node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Cache Node.js dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Cache Yarn dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            client_app/node_modules
            client_app/.yarn
          key: yarn-cache-${{ runner.os }}-${{ hashFiles('client_app/yarn.lock') }}
          restore-keys: |
            yarn-cache-${{ runner.os }}-

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Assume Github OIDC role
        uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59 # v6.1.3
        with:
          aws-region: us-west-2
          role-to-assume: ${{ vars.DEPLOY_ROLE }}
          role-session-name: federated-collection-discovery-${{
            github.event.inputs.deployment_environment }}-deploy

      - name: Install deployment dependencies
        run: |
          npm install
          uv sync
          cd client_app
          yarn install

      - name: Run CDK deploy
        env:
          STAGE: "${{ github.event.inputs.deployment_environment }}"
          APP_VERSION: "${{ vars.APP_VERSION }}"
          API_VERSION: "${{ vars.API_VERSION }}"
          API_CERTIFICATE_ARN: "${{ vars.API_CERTIFICATE_ARN }}"
          API_DOMAIN_NAME: "${{ vars.API_DOMAIN_NAME }}"
          CLIENT_CERTIFICATE_ARN: "${{ vars.CLIENT_CERTIFICATE_ARN }}"
          CLIENT_DOMAIN_NAME: "${{ vars.CLIENT_DOMAIN_NAME }}"
          STAC_API_URLS: ${{ vars.STAC_API_URLS }}
          WEB_ACL_ARN: ${{ vars.WEB_ACL_ARN }}
        run: |
          start_time=$(date +%s)
          uv run npx cdk deploy --all --require-approval never --outputs-file cdk-output.json
          status=$?
          end_time=$(date +%s)
          duration=$((end_time - start_time))
          echo "success=${status}" >> $GITHUB_ENV
          echo "duration=${duration}" >> $GITHUB_ENV
          if [ $status -eq 0 ]; then
            echo "CDK deploy successful."
          else
            echo "CDK deploy failed." >&2
            exit 1
          fi
          export STACK_NAME=$(jq -r 'keys_unsorted[0]' cdk-output.json)
          export VITE_API_URL=$(jq -r --arg stack_name "$STACK_NAME" '.[$stack_name].ApiEndpoint' cdk-output.json)
          echo "VITE_API_URL=$VITE_API_URL" >> $GITHUB_ENV
          export BUCKET_NAME=$(jq -r --arg stack_name "$STACK_NAME" '.[$stack_name].ClientBucketName' cdk-output.json)
          echo "BUCKET_NAME=$BUCKET_NAME" >> $GITHUB_ENV
          export DISTRIBUTION_ID=$(jq -r --arg stack_name "$STACK_NAME" '.[$stack_name].CloudFrontId' cdk-output.json)
          echo "DISTRIBUTION_ID=$DISTRIBUTION_ID" >> $GITHUB_ENV

      - name: Build and deploy client app
        working-directory: client_app
        run: |
          yarn build
          aws s3 sync ./build s3://${BUCKET_NAME}
          # invalidate existing index.html to refresh the site
          aws cloudfront create-invalidation --distribution-id ${DISTRIBUTION_ID} --paths "/*"

      - name: Upload cdk-output.json
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cdk-output.json

          path: cdk-output.json
